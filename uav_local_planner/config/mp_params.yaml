mp_node:
  ros__parameters:

    # ── Arc primitive geometry ────────────────────────────────────────────
    # Total horizontal arcs = num_az_horizontal × num_curvatures (default: 18×5 = 90)
    num_az_horizontal: 18        # azimuth directions (20° spacing)
    num_curvatures:    5         # curvature samples: [-κ_max .. 0 .. +κ_max]
    max_curvature:     0.4       # 1/m  →  min turning radius = 2.5 m at max_speed
    arc_length:        2.0       # primitive length (m), matches A010 sensor range

    # ── Pitched layers (ceiling / floor detection) ────────────────────────
    # Straight-line segments; one layer per angle, num_az_pitched per layer.
    # Total pitched primitives = len(elevation_angles_deg) × num_az_pitched (default: 4×18 = 72)
    elevation_angles_deg: [30.0, 15.0, -15.0, -30.0]
    num_az_pitched: 18

    # ── Collision geometry ────────────────────────────────────────────────
    collision_radius: 0.75       # m  — robot radius (0.30) + safety margin (0.45)
    min_clearance:    1.0        # m  — e-stop trigger distance

    # ── Speed limits ─────────────────────────────────���────────────────────
    max_speed: 1.5               # m/s  horizontal ceiling
    min_speed: 0.2               # m/s  floor when near obstacle
    max_vz:    1.0               # m/s  vertical ceiling
    alt_kp:    0.8               # altitude P-gain (vz = alt_kp × height_error)
    max_accel: 0.75              # m/s²  slew-rate limit on velocity changes

    # ── Direction scoring weights ─────────────────────────────────────────
    # cost = w_goal × Δangle_to_goal + w_prev × Δangle_to_prev + w_pos × pos_norm
    #   pos_norm = end_dist_to_goal / best_end_dist  (reward closing distance)
    w_goal: 3.0
    w_prev: 2.0
    w_pos:  2.0

    # ── Obstacle detection persistence ───────────────────────────────────
    # obstacle_detected engages when obs_dist < arc_length.
    # It only clears when obs_dist > arc_length × obstacle_hysteresis_factor,
    # preventing AVOIDING→NOMINAL flicker when the obstacle sits at the boundary.
    obstacle_hysteresis_factor: 1.3   # disengage threshold = 2.0 × 1.3 = 2.6 m

    # Minimum planner cycles to hold bypass_state before checking exit condition.
    # At 20 Hz: 60 cycles = 3 s.  Safety fallback (bypass side fully blocked)
    # always overrides this regardless of the counter.
    bypass_min_hold_cycles: 60

    # ── Temporal point buffer ────────────────────────────��────────────────
    # Circular FIFO in base_link frame. Covers sensor blind spots during yaw.
    # Memory ≈ history_capacity × 12 bytes  (default: 16384 × 12 = 192 KB)
    history_capacity:  16384     # max stored points
    history_subsample: 2         # keep 1-in-N from each incoming cloud

    # ── Pessimistic obstacle distance filter ────────────────────────────────
    # Temporal-min window over closest_obstacle_dist; smooths high-frequency
    # flicker when the drone yaws between thin obstacles.
    pessimistic_window: 10       # cycles (0.5 s at 20 Hz)

    # ── Recovery cooldown ──────────────────────────────────────────────────
    # After ESTOP clears, enter RECOVERING state with a reduced speed cap.
    recovery_duration_sec: 2.0   # seconds of cooldown
    recovery_max_speed: 0.5      # m/s  speed cap during RECOVERING

    # ── Stall detection ───────────────────────────────────────────────────
    # Tracks the drone's best-ever distance to the goal since the last waypoint.
    # STALLED fires when that best distance has not improved by stall_progress_min
    # within stall_no_improve_window seconds.
    #
    # This catches both:
    #   (a) Complete stop:  dist never shrinks → timer runs to timeout
    #   (b) Oscillation near obstacle: drone bounces between 0.12 m and 1.75 m;
    #       best_ever = 0.12 m never beats 0.12 - 0.15 = -0.03 m → fires after 20 s
    #
    # stall_ignore_radius should match the waypoint acceptance radius so that
    # mission_complete fires before the stall detector can trigger on arrival.
    stall_no_improve_window: 20.0  # seconds without best-dist improvement → stall
    stall_progress_min:       0.15 # min dist reduction that resets the clock (m)
    stall_ignore_radius:      0.25 # suppress detection when already this close (m)

    # ── Orbit detection ───────────────────────────────────────────────────
    # Accumulates yaw change; if the drone rotates past orbit_yaw_threshold
    # without making orbit_progress_min metres of goal progress → safety hover.
    # Ignored when within orbit_ignore_radius of the goal.
    orbit_yaw_threshold:  4.712  # radians of cumulative yaw before orbit fires (270°)
    orbit_progress_min:   0.3    # metres of goal progress that reset the accumulator
    orbit_ignore_radius:  0.3    # suppress orbit check when already this close (m)

    # ── Control rate ──────────────────────────────────────────────────────
    update_rate_hz: 20.0
